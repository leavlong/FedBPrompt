MODEL:
  BACKBONE: resnet50
  PRETRAINED: true
  EMBED_DIM: 256
  NUM_HEADS: 8
  DROPOUT: 0.1
  NUM_CLASSES: 10

TRAIN:
  EPOCHS: 100
  BATCH_SIZE: 32
  NUM_WORKERS: 8
  LR: 1.0e-4
  WEIGHT_DECAY: 1.0e-4
  CLIP_GRAD: 1.0

DATA:
  ROOT: data/
  IMG_SIZE: 224
  MEAN: [0.485, 0.456, 0.406]
  STD: [0.229, 0.224, 0.225]

OUTPUT:
  DIR: output/bapm_default
  LOG_INTERVAL: 50
  SAVE_FREQ: 10
